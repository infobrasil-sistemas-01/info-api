services:
  infoapi-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infoapi-blue
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:${PORT}/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/infoapi?schema=public
      - PORT=${PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infoapi-network
    restart: unless-stopped

  infoapi-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infoapi-green
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:${PORT}/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/infoapi?schema=public
      - PORT=${PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infoapi-network
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      - PORT=${PORT}
      - ACTIVE_UPSTREAM=infoapi-blue
    depends_on:
      infoapi-blue:
        condition: service_healthy
    networks:
      - infoapi-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: infoapi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-infoapi}
    ports:
      - '5433:5432'
    volumes:
      - infoapi_pgdata:/var/lib/postgresql/data
    networks:
      - infoapi-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-infoapi}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  infoapi_pgdata:

networks:
  infoapi-network:
    driver: bridge