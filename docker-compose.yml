services:
  postgres:
    image: postgres:16
    container_name: infoapi-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infoapi
    ports:
      - '5433:5432'
    volumes:
      - infoapi_pgdata:/var/lib/postgresql/data

volumes:
  infoapi_pgdata:
