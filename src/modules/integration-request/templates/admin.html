<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center | Info Vendas</title>
    <link rel="icon" type="image/x-icon" href="/integration/assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/integration/assets/admin.css">
</head>

<body>
    <!-- Login Section -->
    <div id="login-section" class="login-overlay">
        <div class="login-box">
            <h2>InfoAPI Admin</h2>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Seu usuário">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Sua senha">
            </div>
            <button class="btn btn-primary" style="width: 100%" onclick="Auth.login()">Entrar</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="admin-content" class="dashboard hidden">
        <header>
            <div style="display: flex; align-items: center; gap: 16px;">
                <img src="https://static.wixstatic.com/media/97349f_a4abdfe6f4384c2884ae2228ad3528b9~mv2.png/v1/fill/w_60,h_60,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/Cabe%C3%A7alhoSIte_fw.png"
                    alt="Logo" style="height: 32px;">
                <h1>Admin Center</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span id="user-display" style="font-weight: 600; color: var(--text-muted);"></span>
                <button class="btn btn-outline" onclick="Auth.logout()">Sair</button>
            </div>
        </header>

        <nav class="tabs">
            <div id="tab-requests" class="tab-btn hidden" onclick="switchTab('requests')">Solicitações</div>
            <div id="tab-users" class="tab-btn hidden" onclick="switchTab('users')">Usuários</div>
            <div id="tab-roles" class="tab-btn hidden" onclick="switchTab('roles')">Roles</div>
            <div id="tab-creds" class="tab-btn hidden" onclick="switchTab('creds')">Credenciais DB</div>
        </nav>

        <!-- Sections -->
        <section id="section-requests" class="tab-content hidden"></section>
        <section id="section-users" class="tab-content hidden"></section>
        <section id="section-roles" class="tab-content hidden"></section>
        <section id="section-creds" class="tab-content hidden"></section>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div id="user-modal" class="modal hidden"></div>
        <div id="role-modal" class="modal hidden"></div>
        <div id="cred-modal" class="modal hidden"></div>
    </div>

    <script>const API_URL = '/api/v1';</script>
    <script src="/integration/assets/admin-components.js"></script>
    <script src="/integration/assets/admin-core.js"></script>
    <script>Auth.check();</script>
</body>

</html>
