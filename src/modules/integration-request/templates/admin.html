<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center | Info Vendas</title>
    <link rel="icon" type="image/x-icon" href="/integration/assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/integration/assets/admin.css">
</head>

<body>
    <!-- Login Section -->
    <div id="login-container" class="hidden">
        <div class="login-card">
            <div class="brand-login">
                <span class="brand-name">Info<span>API</span></span>
            </div>
            <h1>Bem-vindo</h1>
            <p>Acesse sua área de administração</p>
            <form id="login-form">
                <div class="form-group">
                    <label>E-mail ou Usuário</label>
                    <input type="text" id="username" required placeholder="Digite seu acesso">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div id="login-error" class="error-msg hidden">Credenciais inválidas</div>
        </div>
    </div>

    <!-- Main Dashboard Wrapper -->
    <div id="admin-wrapper" class="hidden">
        <div id="admin-content" class="dashboard">
            <header>
                <div class="header-content">
                    <div class="brand">
                        <span class="brand-name">Info<span>API</span></span>
                        <span class="brand-divider"></span>
                        <span class="panel-name">Administração</span>
                    </div>
                    <div class="header-right">
                        <div class="user-info">
                            <span id="user-display"
                                style="font-weight: 600; color: var(--text-muted); font-size: 0.9rem;"></span>
                            <div class="avatar"
                                style="width: 38px; height: 38px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white;">
                                A</div>
                        </div>
                        <button class="btn-logout" onclick="Auth.logout()" title="Sair"
                            style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;">
                            <i class='bx bx-log-out bx-flip-horizontal' style="font-size: 1.3rem;"></i>
                        </button>
                    </div>
                </div>
            </header>

            <nav class="tabs">
                <div id="tab-requests" class="tab-btn hidden" onclick="switchTab('requests')">Solicitações</div>
                <div id="tab-users" class="tab-btn hidden" onclick="switchTab('users')">Usuários</div>
                <div id="tab-roles" class="tab-btn hidden" onclick="switchTab('roles')">Perfis de Acesso</div>
                <div id="tab-creds" class="tab-btn hidden" onclick="switchTab('creds')">Credenciais DB</div>
                <div id="tab-announcements" class="tab-btn hidden" onclick="switchTab('announcements')">Avisos</div>
                <div id="tab-links" class="tab-btn" onclick="switchTab('links')">Links Úteis</div>
            </nav>

            <!-- Sections -->
            <section id="section-requests" class="tab-content hidden"></section>
            <section id="section-users" class="tab-content hidden"></section>
            <section id="section-roles" class="tab-content hidden"></section>
            <section id="section-creds" class="tab-content hidden"></section>
            <section id="section-announcements" class="tab-content hidden"></section>
            <section id="section-links" class="tab-content hidden"></section>
        </div>

        <footer class="app-footer">
            <div class="footer-content">
                <div class="footer-info">
                    <p>&copy; 2026 InfoBrasil Sistemas. Todos os direitos reservados.</p>
                </div>
                <div class="footer-links">
                    <a href="https://infobrasil.statuspage.one" target="_blank">
                        <i class='bx bx-pulse'></i> Status do Sistema
                    </a>
                    <a href="https://www.infobrasilsistemas.com.br" target="_blank">
                        <i class='bx bx-globe'></i> Site Oficial
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div id="user-modal" class="modal hidden"></div>
        <div id="role-modal" class="modal hidden"></div>
        <div id="cred-modal" class="modal hidden"></div>
        <div id="announcement-modal" class="modal hidden"></div>
    </div>

    <script>const API_URL = '/api/v1';</script>
    <script src="/integration/assets/admin-components.js"></script>
    <script src="/integration/assets/admin-core.js"></script>
    <script>Auth.check();</script>
</body>

</html>
